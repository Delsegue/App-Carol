<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pra você</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ffe3ee, #fff8fb);
      font-family: Arial, sans-serif;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      background: white;
      max-width: 500px;
      width: 100%;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.12);
      text-align: center;
    }

    h1 {
      color: #d94f85;
      margin-top: 0;
    }

    p {
      color: #555;
      font-size: 18px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Muito espertinha</h1>
    <p>
      Só para te lembrar o quanto gosto de ti.<br><br>
      Será um prazer inenarrável dividir a vida contigo.
    </p>
  </div>
</body>
</html>
